name: wired-world

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    build: .
    command:
      - -redis=redis:6379
      - -addr=:80
    ports:
      - "127.0.0.1:8000:80"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
